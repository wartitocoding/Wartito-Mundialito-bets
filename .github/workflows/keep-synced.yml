name: Keep matches synced

# Mantiene el contenedor de Railway despierto y dispara la sincronización de
# resultados/puntos cada 5 minutos, aunque nadie tenga la app abierta.
# (Railway congela el proceso cuando no hay requests, lo que pausa el
#  scheduler interno; este ping lo despierta y gatilla el auto-sync.)

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch: {}       # permite correrlo a mano desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/matches (despierta + auto-sync)
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
              "https://wartito-mundialito-bets-production.up.railway.app/api/matches") || code=000
            echo "intento $i → HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "No respondió 200 tras 3 intentos"; exit 1
